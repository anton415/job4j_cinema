<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Покупка не выполнена')}"></head>
<body>
<div th:replace="~{fragments/navigation :: navigation}"></div>
<main class="app-main container py-5">

        <h1 class="h3 mb-3">Место уже занято</h1>

        <div class="d-flex gap-2">
            <a class="btn btn-primary" th:href="@{/tickets/buy/{id}(id=${sessionId})}">Выбрать другое место</a>

        </div>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>

</html>
