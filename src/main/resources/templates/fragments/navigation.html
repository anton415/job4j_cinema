<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navigation" class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">job4j_cinema</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavigation"
                aria-controls="mainNavigation" aria-expanded="false" aria-label="Открыть меню">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavigation">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/sessions}">Расписание</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/films}">Кинотека</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2" th:if="${user == null || user.id == 0}">
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/users/register}">Регистрация</a>
                <a class="btn btn-primary btn-sm" th:href="@{/login}">Вход</a>
            </div>
            <div class="d-flex align-items-center gap-3" th:if="${user != null && user.id > 0}">
                <span class="text-secondary" th:text="${user.fullName}">Пользователь</span>
                <a class="btn btn-outline-primary btn-sm" th:href="@{/logout}">Выйти</a>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
