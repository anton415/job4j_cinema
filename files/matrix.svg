<svg xmlns="http://www.w3.org/2000/svg" width="480" height="720" viewBox="0 0 480 720" role="img" aria-labelledby="title desc">
  <title id="title">The Matrix poster</title>
  <desc id="desc">Original vector poster inspired by a digital code rain world.</desc>
  <defs>
    <linearGradient id="matrixBackground" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#031109"/>
      <stop offset="0.46" stop-color="#071f13"/>
      <stop offset="1" stop-color="#020604"/>
    </linearGradient>
    <radialGradient id="matrixGlow" cx="50%" cy="42%" r="48%">
      <stop offset="0" stop-color="#34ff8b" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#0d6b39" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="codeRain" width="40" height="120" patternUnits="userSpaceOnUse">
      <text x="5" y="18" fill="#69f79d" fill-opacity="0.55" font-family="Menlo, Consolas, monospace" font-size="13">01</text>
      <text x="10" y="42" fill="#36d978" fill-opacity="0.35" font-family="Menlo, Consolas, monospace" font-size="12">10</text>
      <text x="2" y="69" fill="#a6ffbf" fill-opacity="0.42" font-family="Menlo, Consolas, monospace" font-size="14">11</text>
      <text x="18" y="100" fill="#2fbd67" fill-opacity="0.28" font-family="Menlo, Consolas, monospace" font-size="12">00</text>
      <path d="M32 0v120" stroke="#2eef7c" stroke-opacity="0.12"/>
    </pattern>
    <filter id="softGreen" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="480" height="720" fill="url(#matrixBackground)"/>
  <rect width="480" height="720" fill="url(#codeRain)"/>
  <rect width="480" height="720" fill="url(#matrixGlow)"/>
  <rect x="34" y="34" width="412" height="652" rx="2" fill="none" stroke="#32e57a" stroke-width="4"/>
  <path d="M100 566c28-72 74-106 140-106s112 34 140 106" fill="#020403" opacity="0.82"/>
  <path d="M178 317c0-44 25-78 62-78s62 34 62 78c0 43-25 81-62 81s-62-38-62-81z" fill="#07100c"/>
  <path d="M152 320c12-63 45-102 88-102s76 39 88 102c-22-25-51-39-88-39s-66 14-88 39z" fill="#101915"/>
  <path d="M178 321h124" stroke="#0b0f0d" stroke-width="22" stroke-linecap="round"/>
  <path d="M179 313h44m34 0h44" stroke="#42ff8d" stroke-width="6" stroke-linecap="round"/>
  <path d="M223 314c8 7 25 7 34 0" stroke="#42ff8d" stroke-opacity="0.45" stroke-width="3" fill="none"/>
  <ellipse cx="240" cy="430" rx="76" ry="20" fill="#2dff7d" opacity="0.22" filter="url(#softGreen)"/>
  <text x="240" y="584" text-anchor="middle" fill="#b9ffd0" font-family="Arial, sans-serif" font-size="26" letter-spacing="6">THE</text>
  <text x="240" y="636" text-anchor="middle" fill="#52ff91" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900">MATRIX</text>
  <text x="240" y="666" text-anchor="middle" fill="#d9ffe5" font-family="Arial, sans-serif" font-size="17">1999</text>
</svg>
